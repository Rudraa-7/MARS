<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Distress Signal Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #111 0%, #050505 60%);
            color: #eee;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: center;
            background: #0b0f1a;
            border-bottom: 1px solid #222;
        }

        .navbar button {
            background: none;
            border: none;
            color: #aaa;
            padding: 18px 30px;
            font-size: 16px;
            cursor: pointer;
        }

        .navbar button.active {
            color: #ff6b6b;
            border-bottom: 3px solid #ff6b6b;
        }

        .navbar button:hover {
            color: #fff;
        }

        /* CARD */
        .card {
            width: 420px;
            margin: 40px auto;
            background: #0d1220;
            border-radius: 14px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 80, 80, 0.15);
        }

        /* INPUTS */
        textarea,
        input[type=file],
        button {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
        }

        textarea {
            background: #0a0f1c;
            color: #eee;
        }

        /* BUTTONS */
        button {
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .blue {
            background: #4169e1;
            color: #fff;
            box-shadow: 0 0 10px #4169e1;
        }

        .green {
            background: #3fa34d;
            color: #fff;
            box-shadow: 0 0 10px #3fa34d;
        }

        .red {
            background: #d73027;
            color: #fff;
            box-shadow: 0 0 10px #d73027;
        }

        /* RESULT BOX */
        .result {
            margin-top: 18px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        /* NORMAL */
        .result.normal {
            background: #0f2a18;
            border-left: 5px solid #3fa34d;
            box-shadow: 0 0 15px rgba(63, 163, 77, 0.6);
        }

        /* DISTRESS */
        .result.distress {
            background: #2a0f0f;
            border-left: 5px solid #ff4d4d;
            box-shadow: 0 0 18px rgba(255, 77, 77, 0.8);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 77, 77, 1);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
            }
        }

        /* STATUS BADGE */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .badge.normal {
            background: #3fa34d;
        }

        .badge.distress {
            background: #ff4d4d;
        }

        .hidden {
            display: none;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <div class="navbar">
        <button class="active" onclick="showTab('text', this)">📝 Text Analyzer</button>
        <button onclick="showTab('audio', this)">🎧 Audio Analyzer</button>
        <button onclick="showTab('live', this)">🎙️ Live Recording</button>
    </div>

    <!-- TEXT ANALYZER -->
    <div class="card" id="text">
        <h2>📝 Text Distress Analyzer</h2>
        <textarea id="textInput" rows="4" placeholder="Example: enemy firing near village"></textarea>
        <button class="blue" onclick="analyzeText()">Analyze Text</button>
        <div class="result" id="textResult"></div>
    </div>

    <!-- AUDIO UPLOAD -->
    <div class="card hidden" id="audio">
        <h2>🎧 Audio Distress Analyzer</h2>
        <input type="file" id="audioFile" accept="audio/*">
        <button class="blue" onclick="analyzeAudio()">Analyze Uploaded Audio</button>
        <div class="result" id="audioResult"></div>
    </div>

    <!-- LIVE RECORDING -->
    <div class="card hidden" id="live">
        <h2>🎙️ Live Audio Analyzer</h2>
        <button class="green" onclick="startRecording()">▶ Start Live Recording</button>
        <button class="red" onclick="stopRecording()">■ Stop Recording</button>
        <div class="result" id="liveResult"></div>
    </div>

    <div class="footer">
        Project MARS · By Abhiram Rudra
    </div>

    <script>
        let recorder, audioChunks = [];

        /* TAB SWITCH */
        function showTab(tab, btn) {
            document.querySelectorAll(".card").forEach(c => c.classList.add("hidden"));
            document.getElementById(tab).classList.remove("hidden");

            document.querySelectorAll(".navbar button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        }

        /* RESULT RENDER */
        function showResult(el, status, confidence, transcription = null) {
            el.style.display = "block";
            el.className = "result " + (status === "NORMAL" ? "normal" : "distress");

            const emoji = status === "NORMAL" ? "🟢" : "🚨";

            el.innerHTML = `
        <div class="badge ${status === "NORMAL" ? "normal" : "distress"}">
            ${emoji} ${status}
        </div>
        ${transcription ? `<p><b>Transcription:</b> ${transcription}</p>` : ""}
        <p><b>Confidence:</b> ${confidence}</p>
    `;
        }

        /* TEXT ANALYSIS */
        function analyzeText() {
            fetch("/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: document.getElementById("textInput").value })
            })
                .then(res => res.json())
                .then(d => {
                    showResult(
                        document.getElementById("textResult"),
                        d.status,
                        d.confidence
                    );
                });
        }

        /* AUDIO UPLOAD */
        function analyzeAudio() {
            const file = document.getElementById("audioFile").files[0];
            const formData = new FormData();
            formData.append("audio", file);

            fetch("/analyze-audio", { method: "POST", body: formData })
                .then(res => res.json())
                .then(d => {
                    showResult(
                        document.getElementById("audioResult"),
                        d.prediction,
                        d.confidence,
                        d.transcription
                    );
                });
        }

        /* LIVE RECORDING */
        function startRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                recorder = new MediaRecorder(stream);
                audioChunks = [];
                recorder.ondataavailable = e => audioChunks.push(e.data);
                recorder.start();
                document.getElementById("liveResult").style.display = "block";
                document.getElementById("liveResult").innerText = "🎙️ Recording...";
            });
        }

        function stopRecording() {
            recorder.stop();
            recorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: "audio/webm" });
                const formData = new FormData();
                formData.append("audio", blob, "live.webm");

                fetch("/analyze-audio", { method: "POST", body: formData })
                    .then(res => res.json())
                    .then(d => {
                        showResult(
                            document.getElementById("liveResult"),
                            d.prediction,
                            d.confidence,
                            d.transcription
                        );
                    });
            };
        }
    </script>

</body>

</html>
